<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />
  <link rel="stylesheet" href="css/style.css">
  <title>SkinVibe</title>
</head>

<body>
  <div id="main-content">
    <!-- Header/Navbar -->
    <header>
      <nav class="navbar">
        <a href="#" class="nav-logo">Skin<span>Vibe</span></a>
        <div class="hamburger">
          <i class="fa-solid fa-bars"></i>
        </div>
        <ul class="nav-menu">
          <li class="nav-items"><a href="index.html">Home</a></li>
          <li class="nav-items"><a href="shop.html">Shop</a></li>
          <li class="nav-items"><a href="about.html">About</a></li>
          <li class="nav-items"><a href="testimonials.html">Testimonials</a></li>
          <li class="nav-items"><a href="contact.html">Contact</a></li>
        </ul>
      </nav>
    </header>

    <div id="skeleton">
      <div class="skeleton-navbar"></div>
      <div class="skeleton-hero">
        <div class="skeleton-text"></div>
        <div class="skeleton-text small"></div>
        <div class="skeleton-btn"></div>
        <div class="skeleton-image"></div>
      </div>
    </div>
    <!-- Contact Section  -->
    <section class="contact" id="contact">
      <h2>Contact Us</h2>

      <div class="contact-container">

        <!-- Left Info -->
        <div class="contact-info">
          <h3>Get in Touch</h3>
          <p>Have questions about our products? We’d love to hear from you.</p>

          <p><i class="fa-solid fa-location-dot"></i> Kathmandu, Nepal</p>
          <p><i class="fa-solid fa-envelope"></i> support@skinvibe.com</p>
          <p><i class="fa-solid fa-phone"></i> +977 98XXXXXXXX</p>
        </div>

        <!-- Right Form -->
        <form class="contact-form">
          <input type="text" placeholder="Your Name" required>
          <input type="email" placeholder="Your Email" required>
          <textarea rows="5" placeholder="Your Message" required></textarea>
          <button type="submit">Send Message</button>
        </form>

      </div>
    </section>
  </div>



</body>
<script src="js/script.js"></script>

</html>
